<body class="premium-theme">

    <!-- ==========================================

         ========================================== -->
    <section class="premium-section" style="padding-top: 140px;">
        <div class="container">
            <div class="contact-premium-grid">
                
                <!-- Left Details -->
                <div class="contact-details-premium">
                    <h3>Fale Conosco</h3>
                    <p>Estamos prontos para atender as demandas tecnológicas e de inteligência da sua organização.</p>
                    
                    <div class="detail-item-premium">
                        <div class="detail-icon-premium"><i class="fa fa-map-marker"></i></div>
                        <div class="detail-text-premium">
                            <h4>Localização</h4>
                            <p>Centro - Guarulhos, São Paulo</p>
                        </div>
                    </div>
                    
                    <div class="detail-item-premium">
                        <div class="detail-icon-premium"><i class="fa fa-envelope"></i></div>
                        <div class="detail-text-premium">
                            <h4>E-mail</h4>
                            <p>contato@elyar.com.br</p>
                        </div>
                    </div>
                    
                    <div class="detail-item-premium">
                        <div class="detail-icon-premium"><i class="fa fa-phone"></i></div>
                        <div class="detail-text-premium">
                            <h4>Telefone / WhatsApp</h4>
                            <p>(11) 9.7737-1257</p>
                        </div>
                    </div>
                </div>

                <!-- Right Form -->
                <div class="contact-premium-form">
                    <h3>Envie uma Mensagem</h3>
                    <div id="contact-success-alert" class="alert alert-success" style="display: none; background: rgba(46, 204, 113, 0.15); border: 1px solid #2ecc71; color: #2ecc71; padding: 15px 18px; border-radius: 8px; margin-bottom: 20px;">
                        <i class="fa fa-check-circle"></i> Mensagem enviada com sucesso! Responderemos em breve.
                    </div>
                    <form id="main-contact-form" name="contact-form" method="post" action="https://formsubmit.co/contato@elyar.com.br">
                        <!-- Configurações do FormSubmit -->
                        <input type="hidden" name="_captcha" value="false">
                        <input type="hidden" name="_subject" value="Nova mensagem de contato - Elyar">
                        <input type="hidden" name="_next" value="https://elyar.com.br/contato.html?enviado=1">
                        <div class="form-group-premium">
                            <label for="name">Nome Completo</label>
                            <input class="form-control-premium" type="text" id="name" name="name" required placeholder="Seu nome">
                        </div>
                        <div class="form-group-premium">
                            <label for="email">E-mail Corporativo</label>
                            <input class="form-control-premium" type="email" id="email" name="email" required placeholder="Seu e-mail">
                        </div>
                        <div class="form-group-premium">
                            <label for="subject">Assunto</label>
                            <input class="form-control-premium" type="text" id="subject" name="subject" required placeholder="Assunto da mensagem">
                        </div>
                        <div class="form-group-premium">
                            <label for="message">Mensagem</label>
                            <textarea class="form-control-premium" id="message" name="message" required placeholder="Escreva sua mensagem aqui..."></textarea>
                        </div>
                        <button type="submit" class="btn-premium-primary" style="width: 100%; justify-content: center;">Enviar Mensagem</button>
                    </form>
                </div>

            </div>
        </div>

    <script>
        $(document).ready(function () {
            if (window.location.search.indexOf('enviado=1') !== -1) {
                $('#contact-success-alert').show();
                $('#main-contact-form')[0].reset();
                if (window.history.replaceState) {
                    window.history.replaceState(null, '', window.location.pathname);
                }
                $('html, body').animate({ scrollTop: $('.contact-premium-form').offset().top - 140 }, 400);
            }
        });
    </script>
