                                </div>
                                <div class="form-group">
                                    <textarea name="message" class="form-control" rows="8" placeholder="Att, este formulário ainda não está operando favor enviar mensagem para contato@elyar.com.br" required></textarea>

                                <button type="submit" class="btn btn-primary">Enviar Mensagem</button>
